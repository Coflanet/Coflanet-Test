name: Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
      platform:
        description: 'Platform'
        type: choice
        options:
          - android
          - ios
          - both
        default: both
      track:
        description: 'Android track (ignored for iOS)'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal

jobs:
  deploy-android:
    name: Google Play
    if: github.repository == 'PlanewTech/coflanet-app' && (inputs.platform == 'android' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ inputs.release_tag }} \
            --repo ${{ github.repository }} \
            --pattern "app-release.aab" \
            --dir artifacts

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.coflanet.tech.app
          releaseFiles: artifacts/app-release.aab
          track: ${{ inputs.track }}
          status: completed

  deploy-ios:
    name: TestFlight
    if: github.repository == 'PlanewTech/coflanet-app' && (inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: ios/fastlane
          sparse-checkout-cone-mode: false

      - name: Download IPA from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ inputs.release_tag }} \
            --repo ${{ github.repository }} \
            --pattern "*.ipa" \
            --dir artifacts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          IPA_PATH=$(ls artifacts/*.ipa | head -1)
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          cd ios && bundle exec fastlane upload_testflight \
            api_key_path:$RUNNER_TEMP/AuthKey.p8 \
            api_key_id:$APP_STORE_CONNECT_API_KEY_ID \
            api_key_issuer_id:$APP_STORE_CONNECT_ISSUER_ID \
            ipa_path:../$IPA_PATH
