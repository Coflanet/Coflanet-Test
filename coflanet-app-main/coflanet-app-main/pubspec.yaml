name: coflanet
description: "Coflanet flutter mobile app project"
publish_to: 'none'
version: 0.1.2+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & DI
  get: ^4.6.6

  # Local Storage
  shared_preferences: ^2.2.2
  get_storage: ^2.1.1

  # Network
  dio: ^5.4.0

  # Supabase (DB-only mode, no Auth)
  supabase_flutter: ^2.8.4

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # URL Launcher
  url_launcher: ^6.2.0

  # Share
  share_plus: ^10.1.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.2
  flutter_dotenv: ^5.2.1

  # Social Login
  kakao_flutter_sdk_user: ^1.10.0
  flutter_naver_login: ^2.1.1
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#6541F2"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color: "#6541F2"

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Light.otf
          weight: 300
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
